type ApiToken {
	id: ID!
	name: String!
	locationGrants: [String!]!
	readOnly: Boolean!
	createdAt: Int!
	createdByUserId: ID!
	expiresAt: Int
	revokedAt: Int
	lastUsedAt: Int
}

type Category {
	id: ID!
	name: String!
	enabled: Boolean!
	nitcGroupId: String
	nitcParticipantType: String
	nitcGroup: NitcGroup
	createdAt: Int!
	updatedAt: Int!
}

type CategoryMemberPeriodSummary {
	categoryId: ID!
	category: Category!
	totalTime: Int!
	members: [MemberPeriodSummary!]!
}

type CategoryPeriodSummary {
	categoryId: ID!
	category: Category!
	totalTime: Int!
}

type CreateApiTokenResult {
	"""
	The newly-created api token record (no secret).
	"""
	token: ApiToken!
	"""
	The plaintext secret. Returned only once at creation — never again.
	"""
	secret: String!
}

type DashboardCategoryPeriodSummary {
	categoryId: String
	categoryName: String!
	periodCount: Int!
	totalTime: Int!
}

type DashboardDailyPeriodSummary {
	dayStart: Int!
	periodCount: Int!
	totalTime: Int!
}

type DayCategoryPeriodSummary {
	date: String!
	totalTime: Int!
	categories: [CategoryMemberPeriodSummary!]!
}

"""
A scalar that can represent any JSON value.
"""
scalar JSON

type Location {
	id: ID!
	name: String!
	enabled: Boolean!
	nitcEnabled: Int
	sesApiHeadquartersId: String
	lastSuccessfulMemberSync: Int
	createdAt: Int!
	updatedAt: Int!
	people: [Person!]!
	periods(onlyActive: Boolean, startTime: Int, endTime: Int, after: String, before: String, first: Int, last: Int): PeriodConnection!
	periodSummaryByMember(startTime: Int!, endTime: Int!, category: ID): [MemberPeriodSummary!]!
	periodSummaryByCategory(startTime: Int!, endTime: Int!): [CategoryPeriodSummary!]!
	periodSummaryByMemberByCategory(startTime: Int!, endTime: Int!): [MemberCategoryPeriodSummary!]!
	periodSummaryByCategoryByMember(startTime: Int!, endTime: Int!): [CategoryMemberPeriodSummary!]!
	periodSummaryByDayByCategoryByMember(startTime: Int!, endTime: Int!): [DayCategoryPeriodSummary!]!
	sessions: [Session!]!
	dashboardSummary(asOf: Int): LocationDashboardSummary!
}

type LocationDashboardSummary {
