	totalTime7D: Int!
	avgCompletedDuration7D: Int!
	totalKiosks: Int!
	onlineKiosks: Int!
	recentlyActiveKiosks: Int!
	lastSuccessfulMemberSync: Int
	dailyPeriods7D: [DashboardDailyPeriodSummary!]!
	topCategories7D: [DashboardCategoryPeriodSummary!]!
}

type MemberCategoryPeriodSummary {
	personId: ID!
	person: Person!
	totalTime: Int!
	categories: [CategoryPeriodSummary!]!
}

type MemberPeriodSummary {
	personId: ID!
	person: Person!
	totalTime: Int!
}

type MutationRoot {
	authSession(code: String!): String
	"""
	Request an email login code. Always returns true to avoid email enumeration.
	Requires a valid Cloudflare Turnstile token.
	"""
	requestAuthCode(email: String!, turnstileToken: String!): Boolean!
	"""
	Verify an email login code and return an opaque session token on success.
	"""
	verifyAuthCode(email: String!, code: String!): String
	"""
	Revoke the current user's opaque session token (no-op for JWT sessions).
	"""
	logout: Boolean!
	createUser(email: String!, isSuper: Boolean!, locationGrants: [String!]!): User!
	updateUser(id: ID!, email: String!, isSuper: Boolean!, isDev: Boolean!, enabled: Boolean!, locationGrants: [String!]!): User!
	createPerson(locationId: ID!, firstName: String!, lastName: String!, memberNumber: String!): Person!
	updatePerson(id: ID!, firstName: String!, lastName: String!, memberNumber: String!): Person!
	deletePerson(id: ID!): Boolean!
	createPeriod(personId: ID!, locationId: ID!, categoryId: ID!, startTime: Int!, endTime: Int!): Period!
	updatePeriod(id: ID!, personId: ID!, locationId: ID!, categoryId: ID!, startTime: Int!, endTime: Int!): Period!
	updatePeriodTimeCategory(id: ID!, startTime: Int!, endTime: Int!, categoryId: ID!): Period!
	deletePeriod(id: ID!): Boolean!
	createSession(name: String!, locationId: ID!, config: String, healthcheckUrl: String): Session!
	createApiToken(name: String!, locationGrants: [String!]!, readOnly: Boolean!, expiresAt: Int): CreateApiTokenResult!
	updateApiToken(id: ID!, name: String!, locationGrants: [String!]!, readOnly: Boolean!, expiresAt: Int): ApiToken!
	revokeApiToken(id: ID!): Boolean!
	updateSession(id: ID!, name: String!, config: String, healthcheckUrl: String): Session!
	deleteSession(id: ID!): Boolean!
	createLocation(name: String!, nitcEnabled: Int): Location!
	updateLocation(id: ID!, name: String!, enabled: Boolean!, nitcEnabled: Int): Location!
	createCategory(name: String!, nitcGroupId: String, nitcParticipantType: String): Category!
	updateCategory(id: ID!, name: String!, enabled: Boolean!, nitcGroupId: String, nitcParticipantType: String): Category!
	createNitcGroup(id: String, nitcType: String!, nitcTagIds: [Int!]!): NitcGroup!
	updateNitcGroup(id: ID!, nitcType: String!, nitcTagIds: [Int!]!): NitcGroup!
	deleteNitcGroup(id: ID!): Boolean!
	scanRegister2(memberNumber: String!): RegisterResult!
	scanSignOut(id: ID!, startTime: Int!, endTime: Int!, categoryId: ID!): Period!
	enqueueMemberSync(locationId: ID!): Boolean!
	updateMyEmailConfig(dailyLocationIds: [String!]!): User!
	"""
	Start passkey registration for the authenticated user.
	Returns a JSON challenge to pass to the browser's WebAuthn API.
	"""
	beginPasskeyRegistration: PasskeyChallenge!
	"""
	Finish passkey registration: verify the browser response and store the credential.
	"""
	finishPasskeyRegistration(challengeId: String!, credentialJson: String!, name: String!): PasskeyInfo!
	"""
	Start a discoverable passkey login (no username required).
	Returns a JSON challenge to pass to the browser's WebAuthn API.
	"""
	beginPasskeyLogin: PasskeyChallenge!
	"""
	Finish passkey login: verify the browser response and return an opaque session token.
	"""
	finishPasskeyLogin(challengeId: String!, credentialJson: String!): String
	"""
	Rename one of the authenticated user's passkeys.
	"""
	renamePasskey(id: String!, name: String!): PasskeyInfo!
	"""
	Delete one of the authenticated user's passkeys.
	"""
	deletePasskey(id: String!): Boolean!
}

enum NitcExportStatus {
	SYNCED
	PENDING
}

type NitcGroup {
	id: String!
	nitcType: String!
	sesTags: [SesNonIncidentTag!]!
	createdAt: Int
	updatedAt: Int
}

"""
Information about pagination in a connection
"""
type PageInfo {
	"""
	When paginating backwards, are there more items?
	"""
	hasPreviousPage: Boolean!
	"""
	When paginating forwards, are there more items?
	"""
	hasNextPage: Boolean!
	"""
	When paginating backwards, the cursor to continue.
	"""
	startCursor: String
	"""
	When paginating forwards, the cursor to continue.
	"""
	endCursor: String
}

type PasskeyChallenge {
	challengeId: String!
	optionsJson: String!
}

"""
Metadata for a stored passkey credential (never returns the private key material).
"""
type PasskeyInfo {
	id: String!
	name: String!
	createdAt: Int!
	lastUsedAt: Int
}

type Period {
	id: ID!
	personId: ID!
	person: Person!
	locationId: ID!
	location: Location!
	categoryId: ID
	category: Category
	startTime: Int!
	endTime: Int
	createdAt: Int
	updatedAt: Int
	signedInSessionId: ID
	"""
	The kiosk session that signed this period in, if recorded. `None` for
	periods with no recorded sign-in session (older or admin-created periods).
	"""
	signedInSession: Session
	signedOutSessionId: ID
	"""
	The kiosk session that signed this period out, if recorded. `None` for
	periods that are still open or were signed out/edited by an admin.
	"""
	signedOutSession: Session
	nitcEventId: String
	nitcExportStatus: NitcExportStatus
}

type PeriodConnection {
	"""
	Information to aid in pagination.
	"""
	pageInfo: PageInfo!
	"""
	A list of edges.
	"""
	edges: [PeriodEdge!]!
	"""
	A list of nodes.
	"""
	nodes: [Period!]!
}

"""
An edge in a connection.
"""
type PeriodEdge {
	"""
	The item at the end of the edge
	"""
	node: Period!
	"""
	A cursor for use in pagination
	"""
	cursor: String!
}

type Person {
	id: ID!
	"""
	this will be "" if missing
	"""
	firstName: String!
	"""
	this will be "" if missing
	"""
	lastName: String!
	"""
	this can be null
	"""
	registrationNumber: String
	"""
	for backwards compatibility
	"""
	memberNumber: String
	"""
	this can be null
	"""
	sesApiPersonId: String
	"""
	this can be null
	"""
	email: String
	deleted: Boolean!
	createdAt: Int
	updatedAt: Int
	periods(after: String, before: String, first: Int, last: Int): PeriodConnection!
	"""
	The person's most recent period (by start time), or null if they have none.
	"""
	lastPeriod: Period
}

"""
Lightweight result of looking a person up by registration number. Carries only
the values the GSI query already returns, so no additional record fetch is needed.
"""
type PersonRef {
	"""
	The matched person's ID.
	"""
	id: ID!
	"""
	The registration/member number that was looked up.
	"""
	memberNumber: String!
}

type QueryRoot {
	user(
		"""
		ID for the user to look up
		"""
		id: ID
	): User!
	location(
		"""
		ID for the location to look up
		"""
		id: ID!
	): Location!
	person(
		"""
		ID for the person to look up
		"""
		id: ID!
	): Person!
	personByRegistrationNumber(
		"""
		Registration/member number to look up
		"""
		memberNumber: String!
	): PersonRef
	period(
		"""
		ID for the period to look up
		"""
		id: ID!
	): Period!
	session(
		"""
		ID for the session to look up
		"""
		id: ID
	): Session!
	refreshToken: String!
	category(
		"""
		ID for the category to look up
		"""
		id: ID!
	): Category!
	locations: [Location!]!
	users: [User!]!
	categories: [Category!]!
	nitcGroups: [NitcGroup!]!
	nitcGroup(
		"""
		ID for the NITC group to look up
		"""
		id: ID!
	): NitcGroup!
	apiTokens: [ApiToken!]!
	apiToken(id: ID!): ApiToken!
	ses_headquarters: [SesHeadquarters!]!
	ses_nonincident_types: [String!]!
	ses_nonincident_tags: [SesNonIncidentTag!]!
	ses_participant_types: [String!]!
}

type RegisterResult {
	state: RegisterState!
	period: Period
}

enum RegisterState {
	NOT_FOUND
	SIGNED_IN
	SIGN_OUT_PENDING
}

type SesHeadquarters {
	id: ID!
	sesId: ID!
	name: String
	code: String
	latitude: Float
	longitude: Float
	type: String
	status: String
	zone: SesHeadquarters
}

type SesNonIncidentTag {
	id: String!
	name: String!
	primaryActivityName: String!
}

type Session {
	id: ID!
	lastContact: Int
	clientVersion: String
	name: String!
	locationId: ID!
	location: Location!
	code: String
	healthcheckUrl: String
	config: JSON!
	createdAt: Int
	updatedAt: Int
}

type User {
	id: ID!
	email: String!
	"""
	defaults to false if missing
	"""
	isSuper: Boolean!
	isDev: Boolean!
	enabled: Boolean!
	accessTime: Int
	createdAt: Int!
	updatedAt: Int!
	emailSummaryLocationIds: [String!]!
	locationGrantIds: [ID!]!
	locations: [Location!]!
	passkeys: [PasskeyInfo!]!
}

"""
Directs the executor to include this field or fragment only when the `if` argument is true.
"""
directive @include(if: Boolean!) on FIELD | FRAGMENT_SPREAD | INLINE_FRAGMENT
"""
Directs the executor to skip this field or fragment when the `if` argument is true.
"""
directive @skip(if: Boolean!) on FIELD | FRAGMENT_SPREAD | INLINE_FRAGMENT
schema {
	query: QueryRoot
	mutation: MutationRoot
}
