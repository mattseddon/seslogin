name: Pagination integration test (reusable)
on:
  workflow_call:

# Assumes the new-account deploy role via GitHub OIDC to read the pagination
# fixture table. Callers must grant id-token: write (all deploy workflows do).
permissions:
  id-token: write
  contents: read

env:
  RUSTFLAGS: "-Dwarnings"
  AWS_REGION: ap-southeast-2
  DEPLOY_ROLE_ARN: arn:aws:iam::641079927221:role/seslogin-github-deploy

jobs:
  pagination_check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Setup Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: api
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: pagination-test/package-lock.json
      - name: Install pagination-test dependencies
        run: cd pagination-test && npm ci
      - name: Load DB_PREFIX from .env
        run: |
          source .env
          echo "DB_PREFIX=$DB_PREFIX" >> "$GITHUB_ENV"
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Run pagination integration tests
        run: cd pagination-test && npx tsx run-tests.ts
        env:
          AWS_DEFAULT_REGION: ap-southeast-2
